name: Publish

on:
  push:
    tags: ["v*"]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # PyPI Trusted Publishing
      contents: write  # GitHub Release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build
        run: |
          python -m pip install -U pip build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        continue-on-error: true  # Skip silently if Trusted Publishing isn't configured yet.

      - name: Upload wheel + sdist to existing GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Release is created manually (or by `gh release create`) ahead of the tag push.
          # Here we only attach build artifacts; --clobber overwrites if rerun.
          gh release upload "${GITHUB_REF_NAME}" dist/*.whl dist/*.tar.gz \
            --repo "${GITHUB_REPOSITORY}" --clobber || \
            echo "::warning::release ${GITHUB_REF_NAME} not found; assets not uploaded"
